name: Update Valkey Extensions

on:
  repository_dispatch:
    types: [valkey-release, json-release, bloom-release, search-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
      module:
        description: 'Module to release'
        required: true
        type: choice
        options: [valkey, json, bloom, search]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-files:
    name: Update Files and Create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process inputs
        id: process-inputs
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # From trigger
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.client_payload.module }}" >> $GITHUB_OUTPUT
          else
            # Manual trigger
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.inputs.module }}" >> $GITHUB_OUTPUT
          fi

      - name: Guard against unsupported Valkey versions
        if: ${{ steps.process-inputs.outputs.module == 'valkey' }}
        run: |
          VERSION="${{ steps.process-inputs.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          if [ "$MAJOR" -lt 8 ] || { [ "$MAJOR" -eq 8 ] && [ "$MINOR" -lt 1 ]; }; then
            echo "Valkey version must be >= 8.1. Current: $VERSION"
            exit 1
          fi

      - name: Check for existing update PRs
        id: check-prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Look for open PRs with branch names starting with "update-"
          EXISTING_PRS=$(gh pr list --state open --json number,title,headRefName --jq '.[] | select(.headRefName | startswith("update-")) | {number: .number, title: .title, branch: .headRefName}')
          
          if [ -n "$EXISTING_PRS" ]; then
            # Get the most recent PR (first in list)
            PR_NUMBER=$(echo "$EXISTING_PRS" | jq -r '.number' | head -n1)
            PR_BRANCH=$(echo "$EXISTING_PRS" | jq -r '.branch' | head -n1)
            PR_TITLE=$(echo "$EXISTING_PRS" | jq -r '.title' | head -n1)
            
            echo "existing_pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "existing_pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
            echo "existing_pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
            echo "has_existing_pr=true" >> $GITHUB_OUTPUT
            
            echo "Found existing update PR #$PR_NUMBER: $PR_TITLE"
            echo "Branch: $PR_BRANCH"
            echo "Will update existing PR instead of creating new one"
          else
            echo "has_existing_pr=false" >> $GITHUB_OUTPUT
            echo "No existing update PRs found"
          fi

      - name: Checkout existing PR branch or create new branch
        id: checkout-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ "${{ steps.check-prs.outputs.has_existing_pr }}" == "true" ]]; then
            # Checkout existing PR branch
            git fetch origin ${{ steps.check-prs.outputs.existing_pr_branch }}
            git checkout ${{ steps.check-prs.outputs.existing_pr_branch }}
            echo "Checked out existing PR branch: ${{ steps.check-prs.outputs.existing_pr_branch }}"
          else
            # Create new branch
            BRANCH_NAME="update-${{ steps.process-inputs.outputs.module }}-${{ steps.process-inputs.outputs.version }}"
            git checkout -b "$BRANCH_NAME"
            echo "Created new branch: $BRANCH_NAME"
            echo "new_branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update versions.json
        run: |
          python scripts/update-versions.py versions.json \
            "${{ steps.process-inputs.outputs.module }}" \
            "${{ steps.process-inputs.outputs.version }}"

      - name: Generate Dockerfiles
        run: |
          # Download the scripts for bashbrew in local
            jqt='.jq-template.awk'
            wget -qO "$jqt" 'https://github.com/docker-library/bashbrew/raw/9f6a35772ac863a0241f147c820354e4008edf38/scripts/jq-template.awk'
            jqf='.template-helper-functions.jq'
            wget -qO "$jqf" 'https://github.com/docker-library/bashbrew/raw/08c926140ad0af22de58c2a2656afda58082ba3e/scripts/template-helper-functions.jq'

          # Run update script
          chmod +x apply-templates.sh
          ./apply-templates.sh

      - name: Set up bashbrew
        uses: docker-library/bashbrew@v0.1.12

      - name: Generate Jobs Strategy
        id: generate-jobs
        run: |
          BASHBREW_SCRIPTS=/home/runner/work/_actions/docker-library/bashbrew/v0.1.12/scripts
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$strategy" >> $GITHUB_OUTPUT

      - name: Update DockerHub description
        run: |
          echo '${{ steps.generate-jobs.outputs.strategy }}' > strategy.json
          python scripts/update-dockerhub-description.py strategy.json dockerhub-description-template.md dockerhub-description.md
          rm strategy.json

      - name: Commit changes
        id: commit-changes
        run: |
          git add .
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            # Commit with updated message
            if [[ "${{ steps.check-prs.outputs.has_existing_pr }}" == "true" ]]; then
              git commit -m "Add ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }} to existing update"
            else
              git commit -m "Update for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}"
            fi
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes and update/create PR
        if: steps.commit-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ steps.check-prs.outputs.has_existing_pr }}" == "true" ]]; then
            # Push to existing PR branch
            git push origin ${{ steps.check-prs.outputs.existing_pr_branch }}
            
            # Update PR title and description
            CURRENT_BODY=$(gh pr view ${{ steps.check-prs.outputs.existing_pr_number }} --json body --jq '.body')
            CURRENT_TITLE="${{ steps.check-prs.outputs.existing_pr_title }}"
            
            # Create new consolidated title if not already consolidated
            if [[ "$CURRENT_TITLE" != *"multiple"* ]]; then
              NEW_TITLE="Update for multiple extensions"
              gh pr edit ${{ steps.check-prs.outputs.existing_pr_number }} --title "$NEW_TITLE"
            fi
            
            # Add new module update to the description
            NEW_LINE="- Updated ${{ steps.process-inputs.outputs.module }} to version ${{ steps.process-inputs.outputs.version }}"
            
            # Check if this update is already mentioned to avoid duplicates
            if ! echo "$CURRENT_BODY" | grep -q "${{ steps.process-inputs.outputs.module }}.*${{ steps.process-inputs.outputs.version }}"; then
              # Extract the changes section and add the new line
              if echo "$CURRENT_BODY" | grep -q "Changes include:"; then
                # Add to existing changes list
                UPDATED_BODY=$(echo "$CURRENT_BODY" | sed "/Changes include:/a\\
$NEW_LINE")
              else
                # Add changes section if it doesn't exist
                UPDATED_BODY="$CURRENT_BODY"$'\n\n'"Changes include:"$'\n'"$NEW_LINE"
              fi
              
              gh pr edit ${{ steps.check-prs.outputs.existing_pr_number }} --body "$UPDATED_BODY"
              echo "Updated existing PR #${{ steps.check-prs.outputs.existing_pr_number }} with ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}"
            else
              echo "PR already contains update for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}"
            fi
          else
            # Push new branch and create new PR
            BRANCH_NAME="${{ steps.checkout-branch.outputs.new_branch_name }}"
            git push origin "$BRANCH_NAME"
            
            gh pr create \
              --title "Update for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}" \
              --body "This PR was automatically generated in response to a new release of ${{ steps.process-inputs.outputs.module }} version ${{ steps.process-inputs.outputs.version }}.

            Changes include:
            - Updated versions.json for new ${{ steps.process-inputs.outputs.module }} version
            - Regenerated Dockerfiles
            - Updated DockerHub description" \
              --head "$BRANCH_NAME" \
              --base mainline
              
            echo "Created new PR for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}"
          fi

      - name: Clean up temporary files
        if: always()
        run: |
          rm -f .jq-template.awk .template-helper-functions.jq
