name: Update Valkey Extensions

on:
  repository_dispatch:
    types: [valkey-release, json-release, bloom-release, search-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
      module:
        description: 'Module to release'
        required: true
        type: choice
        options: [valkey, json, bloom, search]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-files:
    name: Update Files and Create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Process inputs
        id: process-inputs
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.client_payload.module }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.inputs.module }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update versions.json
        run: |
          python scripts/update-versions.py versions.json \
            "${{ steps.process-inputs.outputs.module }}" \
            "${{ steps.process-inputs.outputs.version }}"

      - name: Generate Dockerfiles
        run: |
          wget -qO .jq-template.awk https://github.com/docker-library/bashbrew/raw/9f6a35772ac863a0241f147c820354e4008edf38/scripts/jq-template.awk
          wget -qO .template-helper-functions.jq https://github.com/docker-library/bashbrew/raw/08c926140ad0af22de58c2a2656afda58082ba3e/scripts/template-helper-functions.jq

          chmod +x apply-templates.sh
          ./apply-templates.sh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Regenerate Dockerfiles for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}" || echo "No changes to commit"

      - name: Set up bashbrew
        uses: docker-library/bashbrew@v0.1.12

      - name: Generate Jobs Strategy
        id: generate-jobs
        run: |
          BASHBREW_SCRIPTS=/home/runner/work/_actions/docker-library/bashbrew/v0.1.12/scripts
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$strategy" >> $GITHUB_OUTPUT

      - name: Update DockerHub description
        run: |
          echo '${{ steps.generate-jobs.outputs.strategy }}' > strategy.json
          python scripts/update-dockerhub-description.py strategy.json dockerhub-description-template.md dockerhub-description.md
          rm strategy.json

      - name: Push changes to existing PR branch or create new one
        id: pr-branch
        run: |
          git fetch origin
          EXISTING_BRANCH=$(git branch -r | grep 'origin/update-' | head -n 1 | sed 's|origin/||' || true)

          if [[ -n "$EXISTING_BRANCH" ]]; then
            echo "Using existing branch: $EXISTING_BRANCH"
            git checkout "$EXISTING_BRANCH"
            git merge origin/main --strategy-option=theirs || true
            git add .
            git commit -m "Add ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}" || echo "No changes"
            git push origin "$EXISTING_BRANCH"
            echo "branch=$EXISTING_BRANCH" >> $GITHUB_OUTPUT
            echo "create_pr=false" >> $GITHUB_OUTPUT
          else
            NEW_BRANCH="update-${{ steps.process-inputs.outputs.module }}-${{ steps.process-inputs.outputs.version }}"
            echo "Creating new branch: $NEW_BRANCH"
            git checkout -b "$NEW_BRANCH"
            git push origin "$NEW_BRANCH"
            echo "branch=$NEW_BRANCH" >> $GITHUB_OUTPUT
            echo "create_pr=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.pr-branch.outputs.create_pr == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.pr-branch.outputs.branch }}
          delete-branch: false
          title: "Update for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}"
          commit-message: |
            Update for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}
          body: |
            This PR was automatically generated in response to a new release of ${{ steps.process-inputs.outputs.module }} version ${{ steps.process-inputs.outputs.version }}.
            
            Changes include:
            - Updated versions.json for new ${{ steps.process-inputs.outputs.module }} version
            - Regenerated Dockerfiles
            - Updated DockerHub description
