name: Automated Valkey Bundle Release

on:
  repository_dispatch:
    types: [valkey-release, json-release, bloom-release, search-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to be released'
        required: true
      module:
        description: 'Module to be released'
        required: true
        type: choice
        options: [valkey, json, bloom, search]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-files:
    name: Update Files and Create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR branch
        id: check-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="automated-updates"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          # Check if the branch exists remotely
          if git ls-remote --exit-code --heads origin $BRANCH_NAME; then
            echo "branch-exists=true" >> $GITHUB_OUTPUT
          else
            echo "branch-exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge existing branch changes if needed
        if: steps.check-branch.outputs.branch-exists == 'true'
        run: |
          # If the branch exists, merge its changes into main to build on top
          git fetch origin ${{ steps.check-branch.outputs.branch-name }}
          git merge origin/${{ steps.check-branch.outputs.branch-name }} --no-edit || echo "No merge needed"

      - name: Process inputs
        id: process-inputs
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # From "repository_dispatch" trigger
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.client_payload.module }}" >> $GITHUB_OUTPUT
          else
            # From "workflow_dispatch" trigger
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.inputs.module }}" >> $GITHUB_OUTPUT
          fi

      - name: Guard against unsupported Valkey versions
        if: ${{ steps.process-inputs.outputs.module == 'valkey' }}
        run: |
          VERSION="${{ steps.process-inputs.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          if [ "$MAJOR" -lt 8 ] || { [ "$MAJOR" -eq 8 ] && [ "$MINOR" -lt 1 ]; }; then
            echo "Valkey version must be >= 8.1. Current: $VERSION"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update-versions.py versions.json \
            "${{ steps.process-inputs.outputs.module }}" \
            "${{ steps.process-inputs.outputs.version }}"

      - name: Update Dockerfiles
        run: |
          # Download the scripts for bashbrew in local
          jqt='.jq-template.awk'
          wget -qO "$jqt" 'https://github.com/docker-library/bashbrew/raw/9f6a35772ac863a0241f147c820354e4008edf38/scripts/jq-template.awk'
          jqf='.template-helper-functions.jq'
          wget -qO "$jqf" 'https://github.com/docker-library/bashbrew/raw/08c926140ad0af22de58c2a2656afda58082ba3e/scripts/template-helper-functions.jq'

          # Run update script
          chmod +x apply-templates.sh
          ./apply-templates.sh

          # Commit the changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update Dockerfiles for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}"

      - name: Set up bashbrew
        uses: docker-library/bashbrew@v0.1.12

      - name: Generate Jobs Strategy
        id: generate-jobs
        run: |
          BASHBREW_SCRIPTS=/home/runner/work/_actions/docker-library/bashbrew/v0.1.12/scripts
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$strategy" >> $GITHUB_OUTPUT

      - name: Update DockerHub description
        run: |
          echo '${{ steps.generate-jobs.outputs.strategy }}' > strategy.json
          python scripts/update-dockerhub-description.py strategy.json dockerhub-description-template.md dockerhub-description.md
          rm strategy.json

      - name: Get existing PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.check-branch.outputs.branch-name }}"
          
          # Check if PR already exists
          PR_INFO=$(gh pr list --base main --head $BRANCH_NAME --json number,title,body --limit 1)
          
          if echo "$PR_INFO" | jq -e '.[0]' > /dev/null; then
            PR_NUMBER=$(echo "$PR_INFO" | jq -r '.[0].number')
            EXISTING_TITLE=$(echo "$PR_INFO" | jq -r '.[0].title')
            EXISTING_BODY=$(echo "$PR_INFO" | jq -r '.[0].body')
            
            echo "pr-exists=true" >> $GITHUB_OUTPUT
            echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT
            
            # Create updated title and body
            NEW_TITLE="Automated updates (includes ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }})"
            
            # Add this update to the existing body
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            NEW_BODY="$EXISTING_BODY

            ## Latest Update - $TIMESTAMP
            - Updated ${{ steps.process-inputs.outputs.module }} to ${{ steps.process-inputs.outputs.version }}"           
            echo "title=$NEW_TITLE" >> $GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "pr-exists=false" >> $GITHUB_OUTPUT
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            echo "title=Automated updates for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}" >> $GITHUB_OUTPUT
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "This PR contains automated updates for module releases.

            ## Updates - $TIMESTAMP  
            - Updated ${{ steps.process-inputs.outputs.module }} to ${{ steps.process-inputs.outputs.version }}

            Changes include:
            - Updated versions.json
            - Updated Dockerfiles  
            - Updated DockerHub description

            *This PR may be updated with additional module releases.*" >> $GITHUB_OUTPUT
                        echo "EOF" >> $GITHUB_OUTPUT
                      fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.check-branch.outputs.branch-name }}
          delete-branch: false
          title: ${{ steps.pr-info.outputs.title }}
          body: ${{ steps.pr-info.outputs.body }}
          commit-message: "Update ${{ steps.process-inputs.outputs.module }} to ${{ steps.process-inputs.outputs.version }}"
