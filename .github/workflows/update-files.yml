name: Automated Valkey Bundle Release

on:
  repository_dispatch:
    types: [valkey-release, json-release, bloom-release, search-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to be released'
        required: true
      module:
        description: 'Module to be released'
        required: true
        type: choice
        options: [valkey, json, bloom, search]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-files:
    name: Update Files and Create Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for an existing pull request branch
        id: check-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="valkey-extensions-update"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          
          if git ls-remote --exit-code --heads origin $BRANCH_NAME; then
            echo "branch-exists=true" >> $GITHUB_OUTPUT
          else
            echo "branch-exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup branch strategy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ "${{ steps.check-branch.outputs.branch-exists }}" == "true" ]]; then
            echo "Checking out existing branch..."
            git fetch origin ${{ steps.check-branch.outputs.branch-name }}
            git checkout ${{ steps.check-branch.outputs.branch-name }}
            git pull origin ${{ steps.check-branch.outputs.branch-name }}
          else
            echo "Staying on mainline for new branch creation"
          fi

      - name: Process inputs
        id: process-inputs
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # From "repository_dispatch" trigger
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.client_payload.module }}" >> $GITHUB_OUTPUT
          else
            # From "workflow_dispatch" trigger
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.inputs.module }}" >> $GITHUB_OUTPUT
          fi

      - name: Guard against unsupported Valkey versions
        if: ${{ steps.process-inputs.outputs.module == 'valkey' }}
        run: |
          VERSION="${{ steps.process-inputs.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          if [ "$MAJOR" -lt 8 ] || { [ "$MAJOR" -eq 8 ] && [ "$MINOR" -lt 1 ]; }; then
            echo "Valkey version must be >= 8.1. Current: $VERSION"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update-versions.py versions.json \
            "${{ steps.process-inputs.outputs.module }}" \
            "${{ steps.process-inputs.outputs.version }}"

      - name: Update Dockerfiles
        run: |
          # Download the scripts for bashbrew in local
          jqt='.jq-template.awk'
          wget -qO "$jqt" 'https://github.com/docker-library/bashbrew/raw/9f6a35772ac863a0241f147c820354e4008edf38/scripts/jq-template.awk'
          jqf='.template-helper-functions.jq'
          wget -qO "$jqf" 'https://github.com/docker-library/bashbrew/raw/08c926140ad0af22de58c2a2656afda58082ba3e/scripts/template-helper-functions.jq'

          # Run update script
          chmod +x apply-templates.sh
          ./apply-templates.sh

          # Commit the changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update Dockerfiles for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}" || echo "No changes to commit"

      - name: Set up bashbrew
        uses: docker-library/bashbrew@v0.1.12

      - name: Generate Jobs Strategy
        id: generate-jobs
        run: |
          BASHBREW_SCRIPTS=/home/runner/work/_actions/docker-library/bashbrew/v0.1.12/scripts
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$strategy" >> $GITHUB_OUTPUT

      - name: Update DockerHub description
        run: |
          echo '${{ steps.generate-jobs.outputs.strategy }}' > strategy.json
          python scripts/update-dockerhub-description.py strategy.json dockerhub-description-template.md dockerhub-description.md
          rm strategy.json
          git add dockerhub-description.md
          git commit -m "Update DockerHub description for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}"
      
      - name: Update PR body with new module/version
        if: steps.check-branch.outputs.branch-exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="valkey-extensions-update"
          MODULE="${{ steps.process-inputs.outputs.module }}"
          VERSION="${{ steps.process-inputs.outputs.version }}"
          UPDATE_LINE="- Updated $MODULE to $VERSION"

          PR_INFO=$(gh pr list --base main --head "$BRANCH_NAME" --json number,body --limit 1)

          if echo "$PR_INFO" | jq -e '.[0]' > /dev/null; then
            PR_NUMBER=$(echo "$PR_INFO" | jq -r '.[0].number')
            CURRENT_BODY=$(echo "$PR_INFO" | jq -r '.[0].body')
            NEW_BODY="$CURRENT_BODY"$'\n'"$UPDATE_LINE"
            gh pr edit "$PR_NUMBER" --body "$NEW_BODY"
          else
            echo "No PR found to update."
          fi
      
      - name: Push changes and update existing PR
        if: steps.check-branch.outputs.branch-exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ steps.check-branch.outputs.branch-name }}"
          
          # Push the commits
          git push origin $BRANCH_NAME
        

      - name: Create Pull Request
        if: steps.check-branch.outputs.branch-exists == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.check-branch.outputs.branch-name }}
          delete-branch: false
          title: "Automated updates for module releases"
          body: |
            This PR contains automated updates for valkey bundle releases.

            ## Updates
            - Updated ${{ steps.process-inputs.outputs.module }} to ${{ steps.process-inputs.outputs.version }}
            
            See commit history for details of what was updated.
            
            Changes include:
            - Updated versions.json
            - Updated Dockerfiles  
            - Updated DockerHub description
          commit-message: "Update ${{ steps.process-inputs.outputs.module }} to version ${{ steps.process-inputs.outputs.version }}"
