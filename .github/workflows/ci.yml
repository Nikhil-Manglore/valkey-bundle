name: GitHub CI

on:
  pull_request:
  push:
  workflow_dispatch:

env:
  IS_PULL: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

jobs:

  generate-jobs:
    name: Generate Jobs
    runs-on: ubuntu-latest
    outputs:
      strategy: ${{ steps.generate-jobs.outputs.strategy }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker-library/bashbrew@v0.1.12

      - id: generate-jobs
        run: |
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$(jq -c . <<<"$strategy")" >> "$GITHUB_OUTPUT"
          jq . <<<"$strategy" # debugging aid to visually inspect the generated matrix

  # Single test job - tests one representative build to verify modules work
  test:
    name: Test Modules Integration
    runs-on: ubuntu-latest
    needs: generate-jobs
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pick the first Debian variant for testing (most stable)
      - name: Select test variant
        id: test-variant
        run: |
          strategy='${{ needs.generate-jobs.outputs.strategy }}'
          # Find first debian variant
          test_version=$(echo "$strategy" | jq -r '.matrix.include[] | select(.meta.entries[0].directory | contains("debian")) | .name' | head -1)
          test_directory=$(echo "$strategy" | jq -r --arg name "$test_version" '.matrix.include[] | select(.name == $name) | .meta.entries[0].directory')
          echo "test_version=$test_version" >> "$GITHUB_OUTPUT"
          echo "test_directory=$test_directory" >> "$GITHUB_OUTPUT"

      # Build base image for testing
      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          file: ./${{ steps.test-variant.outputs.test_directory }}/Dockerfile
          push: false
          load: true
          tags: valkey-test-base
          cache-from: type=gha

      # Create test runner script
      - name: Create test runner script
        run: |
          cat > test-runner.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "Starting Valkey server with modules..."
          valkey-server \
            --loadmodule /usr/lib/valkey/libjson.so \
            --loadmodule /usr/lib/valkey/libvalkey_bloom.so \
            --loadmodule /usr/lib/valkey/libsearch.so \
            --bind 127.0.0.1 \
            --protected-mode no \
            --daemonize yes \
            --logfile /tmp/valkey.log \
            --pidfile /tmp/valkey.pid
          
          # Wait for server to start
          echo "Waiting for Valkey server..."
          for i in {1..30}; do
            if redis-cli ping > /dev/null 2>&1; then
              echo "Valkey server is ready!"
              break
            fi
            sleep 1
          done
          
          if ! redis-cli ping > /dev/null 2>&1; then
            echo "Failed to start Valkey server"
            cat /tmp/valkey.log
            exit 1
          fi
          
          # Verify that the modules are loaded
          echo "Checking loaded modules..."
          MODULES=$(redis-cli MODULE LIST)
          echo "Loaded modules: $MODULES"
          
          for module in json bloom search; do
            if ! echo "$MODULES" | grep -qi "$module"; then
              echo "ERROR: $module module was not loaded"
              exit 1
            fi
          done
          
          echo "All modules loaded successfully!"
          
          # Run individual test suites
          TEST_FAILED=0
          
          # Run Valkey core tests
          echo "Running Valkey core tests..."
          cd /tests/valkey
          if ! ./runtest \
            --host 127.0.0.1 \
            --port 6379 \
            --tags -needs:repl \
            --tags -needs:debug \
            --tags -needs:save \
            --tags -cluster:skip \
            --ignore-encoding \
            --ignore-digest \
            --timeout 300 \
            --verbose; then
            echo "ERROR: Valkey core tests failed"
            TEST_FAILED=1
          else
            echo "Valkey Core tests passed"
          fi
          
          # Run JSON module tests
          echo "Running JSON module tests..."
          cd /opt/valkey-json/build
          if ! make -j test; then
            echo "ERROR: Valkey-JSON module tests failed"
            TEST_FAILED=1
          else
            echo "Valkey-JSON module tests passed"
          fi
          
          # Run Bloom module tests  
          echo "Running Bloom module tests..."
          cd /opt/valkey-bloom
          export VALKEY_HOST=127.0.0.1
          export VALKEY_PORT=6379
          if ! cargo test --release; then
            echo "ERROR: Valkey-Bloom module tests failed"
            TEST_FAILED=1
          else
            echo "Valkey-Bloom module tests passed"
          fi
          
          # Run Search module tests
          echo "Running Search module tests..."
          cd /opt/valkey-search 
          if ! ./build.sh --run-tests; then
            echo "ERROR: Valkey-Search module tests failed"
            TEST_FAILED=1
          else
            echo "Valkey-Search module tests passed"
          fi
          
          # Cleanup
          if [ -f /tmp/valkey.pid ]; then
            kill $(cat /tmp/valkey.pid) || true
          fi
          
          if [ $TEST_FAILED -eq 0 ]; then
            echo "All tests completed successfully!"
            exit 0
          else
            echo "Some tests failed!"
            exit 1
          fi
          EOF

      # Create test Dockerfile
      - name: Create test Dockerfile
        run: |
          cat > Dockerfile.test << 'EOF'
          FROM valkey-test-base
          
          # Install additional test dependencies
          RUN apt-get update && apt-get install -y \
              tcl tcl-dev python3 python3-pip redis-tools \
              && rm -rf /var/lib/apt/lists/*
          
          # Install Python dependencies for tests
          RUN pip3 install redis pytest hiredis
          
          # Clone Valkey core for core tests only (modules already exist in /opt/)
          RUN git clone https://github.com/valkey-io/valkey.git /tests/valkey
          
          # Copy test runner script
          COPY test-runner.sh /tests/
          RUN chmod +x /tests/test-runner.sh
          
          WORKDIR /tests
          EOF

      # Build test image
      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.test
          push: false
          load: true
          tags: valkey-test-complete
          cache-from: type=gha

      # Run the actual tests
      - name: Run comprehensive test suite
        run: |
          echo "Running comprehensive test suites for ${{ steps.test-variant.outputs.test_version }}..."
          docker run --rm \
            --name valkey-integration-test \
            valkey-test-complete \
            /tests/test-runner.sh

  # Job to build and push Docker images individually for each architecture/platform (only after tests pass)
  build_and_push:
    needs: [generate-jobs, test]
    strategy:
      fail-fast: false # continue other jobs even if one job fails
      matrix:
        version: ${{ fromJson(needs.generate-jobs.outputs.strategy).matrix.include }}
        platform: [linux/amd64, linux/arm64]

    name: Build and push - ${{ matrix.version.name }} - ${{ matrix.platform }}

    # Dynamic runner selection based on architecture
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set DOCKER_REPO_NAME dynamically
        run: |
          if [[ "${{ env.IS_PULL }}" == "true" ]]; then
            echo "DOCKER_REPO_NAME=${{ github.actor }}/valkey-extensions" >> $GITHUB_ENV
          else
            echo "DOCKER_REPO_NAME=${{ secrets.DOCKERHUB_ACCOUNT }}/valkey-extensions" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.IS_PULL != 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Prepare Docker tags from version metadata, replacing repository name with ACCOUNT/DOCKER_REPOSITORY
      - name: Prepare Tags
        id: prep_tags
        run: |
          original_tags="${{ toJson(matrix.version.meta.entries[0].tags) }}"
          tags=$(echo $original_tags | sed "s|valkey-extensions|${{ env.DOCKER_REPO_NAME }}|g" \
          | sed 's/\[ *//; s/ *\]//; s/ //g' | tr -d '\n')  
          echo "modified_tags=$tags" >> "$GITHUB_OUTPUT"
          echo "$tags" > tags.txt

      - name: Upload Tags Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tags-${{ matrix.version.name }}
          path: tags.txt
          overwrite: true

      # Build Docker images and push them to Docker Hub by digest (sha256)
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          file: ./${{ matrix.version.meta.entries[0].directory }}/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push is true only for push events
          push: ${{ env.IS_PULL != 'true' }}
          outputs: type=image,push-by-digest=true,name-canonical=true
          tags: ${{ env.DOCKER_REPO_NAME }}
          provenance: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Export digest to a file to reference it later in merging manifests
      - name: Export digest
        id: export-digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

          # Check if the version directory contains 'debian'
          if [[ "${{ matrix.version.meta.entries[0].directory }}" == *"debian"* ]]; then
            echo "linux_distro=bookworm" >> "$GITHUB_OUTPUT"
          else
            echo "linux_distro=alpine" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.export-digest.outputs.linux_distro }}-${{ env.PLATFORM_PAIR }}-${{ matrix.version.name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Job to merge architecture-specific images into a single multi-arch manifest
  merge-manifest:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Set DOCKER_REPO_NAME dynamically
        run: |
          if [[ "${{ env.IS_PULL }}" == "true" ]]; then
            echo "DOCKER_REPO_NAME=${{ github.actor }}/valkey-extensions" >> $GITHUB_ENV
          else
            echo "DOCKER_REPO_NAME=${{ secrets.DOCKERHUB_ACCOUNT }}/valkey-extensions" >> $GITHUB_ENV
          fi

      - name: Download Bookworm Digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests/bookworm
          pattern: digests-bookworm-*
          merge-multiple: true

      - name: Download Alpine Digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests/alpine
          pattern: digests-alpine-*
          merge-multiple: true

      - name: Download Tags
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/tags
          pattern: tags-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: env.IS_PULL != 'true'
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Use imagetools to combine the arch-specific digests into respective multi-arch manifest
      - name: Create Multi-Arch Manifest and Push
        working-directory: ${{ runner.temp }}/digests
        run: |
          bookworm_exists=$([ -n "$(sed 's/,/ /g' ${{ runner.temp }}/tags/*.txt | grep -v "alpine")" ] && echo "true" || echo "false")

          # Check if bookworm_exists is true
          if [[ $bookworm_exists == "true" ]]; then
            # Prepare tags and digest references argument for BOOKWORM from downloaded tags artifact
            TAGS_bookworm=$(sed 's/,/ /g' ${{ runner.temp }}/tags/*.txt | grep -v "alpine" | xargs -n1 echo "-t" | tr '\n' ' ')
            DIGESTS_bookworm=$(printf '${{ env.DOCKER_REPO_NAME }}@sha256:%s ' ./bookworm/* | sed 's|./bookworm/||g')

            # Create and push the multi-architecture manifest for BOOKWORM only for push events
            if [[ "${{ env.IS_PULL }}" == "true" ]]; then
              echo "Dry run: docker buildx imagetools create $TAGS_bookworm $DIGESTS_bookworm"
            else
              docker buildx imagetools create $TAGS_bookworm $DIGESTS_bookworm
            fi
          else
            echo "No valid bookworm tags found, skipping bookworm manifest creation."
          fi

          alpine_exists=$([ -n "$(sed 's/,/ /g' ${{ runner.temp }}/tags/*.txt | grep "alpine")" ] && echo "true" || echo "false")
          
          # Check if TAGS_alpine and DIGESTS_alpine are not empty
          if [[ $alpine_exists == "true" ]]; then
            # Prepare tags and digest references argument for ALPINE from downloaded tags artifact
            TAGS_alpine=$(sed 's/,/ /g' ${{ runner.temp }}/tags/*.txt | grep "alpine" | xargs -n1 echo "-t" | tr '\n' ' ')
            DIGESTS_alpine=$(printf '${{ env.DOCKER_REPO_NAME }}@sha256:%s ' ./alpine/* | sed 's|./alpine/||g')

            # Create and push the multi-architecture manifest for ALPINE only for push events
            if [[ "${{ env.IS_PULL }}" == "true" ]]; then
              echo "Dry run: docker buildx imagetools create $TAGS_alpine $DIGESTS_alpine"
            else
              docker buildx imagetools create $TAGS_alpine $DIGESTS_alpine
            fi
          else
            echo "No valid alpine tags found, skipping alpine manifest creation."
          fi

  update-dockerhub-description:
    if: github.event_name == 'push' && github.ref == 'refs/heads/mainline'
    needs: merge-manifest
    name: Update DockerHub Description
    uses: ./.github/workflows/update-dockerhub-docs.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
